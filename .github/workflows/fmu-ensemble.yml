name: fmu-ensemble

permissions:
   contents: write # Write required for GH pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

env:
  UV_FROZEN: true

jobs:
  fmu-ensemble:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 📖 Checkout commit locally
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📖 Checkout tags
        # This seems necessary for setuptools_scm to be able to infer
        # the correct version.
        run: git fetch --unshallow --tags

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          prune-cache: false
          python-version: ${{ matrix.python-version }}


      - name: 📦 Install fmu-ensemble with test dependencies
        run: |
          uv sync --extra=test --extra=docs
          uv pip install res2df

      - name: 🤖 Run tests
        run: |
          uv run python -c "import fmu.ensemble"
          uv run pytest tests/
          uv pip install ".[parquet]"
          uv run pytest tests/test_virtualensemble.py

      - name: Syntax check on RST documentation
        run: uv run rstcheck -r docs/

      - name: Build docs
        run: |
          uv run sphinx-apidoc -H "API for fmu.ensemble" -o ./docs ./src/fmu
          mkdir tmp
          uv run sphinx-build -W -b html -d tmp/doctrees docs build/sphinx/html
          touch build/sphinx/html/.nojekyll

      - name: 🚢 Build and deploy Python package
        if: github.event_name == 'release' && matrix.python-version == '3.11'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.pypi_fmuensemble_token }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine upload dist/*

      - name: 📚 Update GitHub pages
        if: github.event_name == 'release' && github.repository == 'equinor/fmu-ensemble' && matrix.python-version == '3.11'
        run: |
          cp -R ./build/sphinx/html ../html

          git config --local user.email "fmuensemble-github-action"
          git config --local user.name "fmuensemble-github-action"
          git fetch origin gh-pages
          git checkout --track origin/gh-pages
          git clean -f -f -d -x
          git rm -r *

          cp -R ../html/* .

          git add .

          if git diff-index --quiet HEAD; then
            echo "No changes in documentation. Skip documentation deploy."
          else
            git commit -m "Update Github Pages"
            git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          fi
